name: Deploy static site to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dungeonplanner-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      S3_BUCKET: dungeonplanner.fingergun.dev-eu-north-1
      CLOUDFRONT_DISTRIBUTION_ID: E3U9MGNZ370J2M
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=dungeonplanner

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::785092168067:role/github-actions-fingergun-web-deploy
          role-session-name: github-actions-dungeonplanner-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static files to S3
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}" \
            --delete \
            --exclude "*.html"
          aws s3 sync dist/ "s3://${S3_BUCKET}" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
