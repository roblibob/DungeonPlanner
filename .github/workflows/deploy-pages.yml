name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Optional deploy message"
        required: false
        default: ""

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout DungeonPlanner
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /dungeonplanner/

      - name: Checkout roblibob.github.io
        uses: actions/checkout@v4
        with:
          repository: roblibob/roblibob.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Sync build output into dungeonplanner/
        run: |
          rm -rf pages-repo/dungeonplanner
          mkdir -p pages-repo/dungeonplanner
          cp -r dist/. pages-repo/dungeonplanner/

      - name: Commit and push
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dungeonplanner/
          DEPLOY_MSG="Deploy DungeonPlanner"
          if [ -n "${{ github.event.inputs.message }}" ]; then
            DEPLOY_MSG="$DEPLOY_MSG — ${{ github.event.inputs.message }}"
          fi
          DEPLOY_MSG="$DEPLOY_MSG ($(date -u '+%Y-%m-%d %H:%M UTC'), ${{ github.sha }})"
          git diff --cached --quiet || git commit -m "$DEPLOY_MSG"
          git push
